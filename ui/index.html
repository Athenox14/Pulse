<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pulse — test UI</title>
<style>
  body { font-family: system-ui, sans-serif; background:#0f1115; color:#e6e6e6; margin:0; padding:24px; }
  h1 { font-size:20px; }
  .card { background:#181b21; border:1px solid #2a2e37; border-radius:8px; padding:16px; margin-bottom:12px; }
  .row { display:flex; align-items:center; gap:12px; }
  .dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .up { background:#22c55e; }
  .down { background:#ef4444; }
  .pending { background:#eab308; }
  input, select, button { background:#0f1115; color:#e6e6e6; border:1px solid #2a2e37; border-radius:6px; padding:6px 8px; }
  button { cursor:pointer; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
  .muted { color:#8b8f99; font-size:12px; }
  form { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .beat { width:6px; height:20px; display:inline-block; border-radius:2px; margin-right:2px; }
</style>
</head>
<body>
<h1>Pulse — test dashboard</h1>
<div class="card">
  <form id="createForm">
    <input name="name" placeholder="Name" required>
    <select name="type">
      <option value="http">http</option>
      <option value="keyword">keyword</option>
      <option value="tcp">tcp</option>
      <option value="ping">ping</option>
      <option value="dns">dns</option>
    </select>
    <input name="url" placeholder="URL (http/keyword)">
    <input name="hostname" placeholder="hostname (tcp/ping/dns)">
    <input name="port" placeholder="port" type="number" style="width:80px">
    <input name="keyword" placeholder="keyword (if keyword type)">
    <input name="interval_sec" placeholder="interval s" type="number" value="30" style="width:90px">
    <button type="submit">Add monitor</button>
  </form>
</div>
<div id="monitors" class="grid"></div>

<script>
const API_BASE = location.protocol === 'file:' ? 'http://127.0.0.1:3939' : '';
const api = (p, opts) => fetch(API_BASE + p, opts).then(r => r.json());

async function loadMonitors() {
  const monitors = await api('/api/monitors');
  const container = document.getElementById('monitors');
  container.innerHTML = '';
  for (const m of monitors) {
    const div = document.createElement('div');
    div.className = 'card';
    div.id = 'mon-' + m.id;
    div.innerHTML = renderMonitor(m, [], {});
    container.appendChild(div);
    const hbs = await api(`/api/monitors/${m.id}/heartbeats`);
    const uptime = await api(`/api/monitors/${m.id}/uptime`);
    div.innerHTML = renderMonitor(m, hbs, uptime);
  }
}

function renderMonitor(m, hbs, uptime) {
  const latest = hbs[0];
  const statusClass = !latest ? 'pending' : latest.status === 1 ? 'up' : 'down';
  const beats = hbs.slice(0, 30).reverse().map(h => {
    const c = h.status === 1 ? '#22c55e' : '#ef4444';
    return `<span class="beat" style="background:${c}" title="${h.msg||''}"></span>`;
  }).join('');
  const u24 = uptime.uptime_24h !== undefined ? (uptime.uptime_24h*100).toFixed(1) : '-';
  return `
    <div class="row">
      <div class="dot ${statusClass}"></div>
      <strong>${m.name}</strong>
      <span class="muted">${m.type} · ${m.url || m.hostname || ''}</span>
      <div style="margin-left:auto; display:flex; gap:6px;">
        <button onclick="checkNow('${m.id}')">Check now</button>
        <button onclick="togglePause('${m.id}', ${m.active})">${m.active ? 'Pause' : 'Resume'}</button>
        <button onclick="removeMonitor('${m.id}')">Delete</button>
      </div>
    </div>
    <div style="margin-top:8px;">${beats || '<span class="muted">no data yet</span>'}</div>
    <div class="muted" style="margin-top:6px;">${latest ? latest.msg + ' · ' + (latest.ping_ms||'-') + 'ms' : ''} · uptime 24h: ${u24}%</div>
  `;
}

async function checkNow(id) {
  await api(`/api/monitors/${id}/check`, { method: 'POST' });
  setTimeout(loadMonitors, 1500);
}
async function togglePause(id, active) {
  await api(`/api/monitors/${id}/${active ? 'pause' : 'resume'}`, { method: 'POST' });
  loadMonitors();
}
async function removeMonitor(id) {
  await api(`/api/monitors/${id}`, { method: 'DELETE' });
  loadMonitors();
}

document.getElementById('createForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = Object.fromEntries(fd.entries());
  if (payload.port) payload.port = parseInt(payload.port);
  if (payload.interval_sec) payload.interval_sec = parseInt(payload.interval_sec);
  for (const k of ['url','hostname','keyword']) if (!payload[k]) delete payload[k];
  await api('/api/monitors', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  e.target.reset();
  loadMonitors();
});

const wsHost = location.protocol === 'file:' ? '127.0.0.1:3939' : location.host;
const ws = new WebSocket(`ws://${wsHost}/ws`);
ws.onmessage = () => loadMonitors();

loadMonitors();
setInterval(loadMonitors, 10000);
</script>
</body>
</html>
